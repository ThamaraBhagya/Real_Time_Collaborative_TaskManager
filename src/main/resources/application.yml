server:
  port: 8080

spring:
  application:
    name: taskflow-api

  datasource:
    url: jdbc:postgresql://localhost:5432/taskflow
    username: taskflow_user
    password: taskflow_pass
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate        # Flyway owns schema, not Hibernate
    show-sql: false
    properties:
      hibernate:
        format_sql: true


  flyway:
    enabled: true
    locations: classpath:db/migration

  data:
    redis:
      host: localhost
      port: 6379

jwt:
  secret: ${JWT_SECRET:meka-thama-mage-local-secret-key-eka-123456789}
  access-token-expiry: 900000       # 15 minutes
  refresh-token-expiry: 604800000   # 7 days

logging:
  level:
    com.taskflow: DEBUG
    org.springframework.web: INFO